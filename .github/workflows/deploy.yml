name: Deploy to Vercel Container Registry (VCR)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Verify Build & Lint
        run: |
          npm run lint
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Vercel Container Registry
        uses: docker/login-action@v3
        with:
          registry: vcr.vercel.com
          username: ${{ secrets.VERCEL_ORG_ID }}
          password: ${{ secrets.VERCEL_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.vercel
          push: true
          tags: vcr.vercel.com/dcpllc/www.displaycellpros.com-refractored/dcp-depository:latest
          platforms: linux/amd64
          outputs: |
            type=image,oci-mediatypes=true,compression=zstd,compression-level=3,force-compression=true

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
