type User @table {
  username: String!
  createdAt: Timestamp!
  role: String!
  email: String
  organization: String
}

type DeviceTelemetry @table {
  deviceId: String!
  timestamp: Timestamp!
  telemetryType: String!
  value: Float!
  unit: String
  notes: String
  user: User
}

type MotherboardSchematic @table {
  name: String!
  uploadDate: Timestamp!
  vectorData: String!
  description: String
  revision: String
  user: User
}

type CircuitComponent @table {
  componentId: String!
  type: String!
  locationOnSchematic: String!
  expectedBehavior: String!
  manufacturer: String
  partNumber: String
  dataSheetUrl: String
  motherboardSchematic: MotherboardSchematic
}

type TelemetryMapping @table {
  mappingDate: Timestamp!
  telemetryPointIdentifier: String!
  analysisNotes: String
  deviceTelemetry: DeviceTelemetry
  circuitComponent: CircuitComponent
  motherboardSchematic: MotherboardSchematic
}

type DiagnosticReport @table {
  reportDate: Timestamp!
  summary: String!
  status: String!
  faultLocationSuggestions: String
  recommendedActions: String
  attachments: [String]
  user: User
  deviceTelemetry: DeviceTelemetry
  motherboardSchematic: MotherboardSchematic
}